<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unknown | Order Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <nav>
            <h1>The Unknown</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="booking.html">Book a Table</a></li>
                <li><a href="order.html">Order Online</a></li>
                <li><a href="confirmation.html">Confirmation</a></li>
            </ul>
        </nav>
    </header>

    <!-- Order Section -->
    <section class="order-section">
        <h2>Order Online</h2>
        <p>Browse our menu and place your order below:</p>

        <form class="order-form" action="confirmation.html" method="GET">

            <!-- Starters -->
            <h3>Starters</h3>
            <label><input type="checkbox" name="order" value="starter1"> Soup of the Day — R65</label>
            <label><input type="checkbox" name="order" value="starter2"> Garlic Bread — R45</label>
            <label><input type="checkbox" name="order" value="starter3"> Chicken Wings — R75</label>

            <!-- Mains -->
            <h3>Mains</h3>
            <label><input type="checkbox" name="order" value="main1"> Grilled Steak — R165</label>
            <label><input type="checkbox" name="order" value="main2"> Chicken Schnitzel — R135</label>
            <label><input type="checkbox" name="order" value="main3"> Vegetable Stir Fry — R110</label>
            <label><input type="checkbox" name="order" value="main4"> Lamb Shank — R185</label>

            <!-- Desserts -->
            <h3>Desserts</h3>
            <label><input type="checkbox" name="order" value="dessert1"> Malva Pudding — R55</label>
            <label><input type="checkbox" name="order" value="dessert2"> Chocolate Brownie — R60</label>
            <label><input type="checkbox" name="order" value="dessert3"> Ice Cream (3 Scoops) — R45</label>

            <!-- Drinks -->
            <h3>Drinks</h3>
            <label><input type="checkbox" name="order" value="drink1"> Still Water — R20</label>
            <label><input type="checkbox" name="order" value="drink2"> Soft Drink — R30</label>
            <label><input type="checkbox" name="order" value="drink3"> Fresh Juice — R45</label>
            <label><input type="checkbox" name="order" value="drink4"> Coffee / Tea — R35</label>

            <!-- Customer Details -->
            <h3>Your Details</h3>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

            <label for="delivery">Delivery or Collect:</label>
            <select id="delivery" name="delivery" required>
                <option value="">Select an option</option>
                <option value="collect">Collect from Restaurant</option>
                <option value="delivery">Delivery</option>
            </select>

            <label for="notes">Special Instructions:</label>
            <textarea id="notes" name="notes" placeholder="Any allergies or special requests?"></textarea>

            <button type="submit">Place Order</button>

        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 The Unknown Restaurant. All rights reserved.</p>
        <p>Built by Team Unknown | Praesignis AWS re/Start Programme</p>
    </footer>

</body>
</html>
